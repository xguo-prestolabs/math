<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parametric Curve Demo (Canvas)</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel-bg: #ffffff;
      --surface: #f8fbff;
      --border: #d7deea;
      --text: #111827;
      --muted: #5f6a7d;
      --accent: #e11d48;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 0%, #eef3ff, var(--bg) 42%);
    }

    h2 { margin: 0 0 14px; font-size: 1.35rem; }

    #row { display: flex; gap: 16px; align-items: start; flex-wrap: wrap; }

    canvas {
      display: block;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.09);
    }

    .panel {
      width: 320px;
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: var(--panel-bg);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
    }

    label {
      display: block;
      margin: 10px 0 6px;
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 600;
    }

    input[type="range"], select {
      width: 100%;
      accent-color: var(--accent);
    }

    input[type="range"]:disabled { opacity: 0.45; cursor: not-allowed; }

    .kv {
      display: flex;
      justify-content: space-between;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      font-size: 0.9rem;
    }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: background-color 140ms ease, transform 120ms ease;
    }

    button:hover { background: #f2f5fb; }
    button:active { transform: translateY(1px); }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 1120px) {
      canvas { width: min(100%, 760px); height: auto; }
      .panel { width: min(760px, 100%); }
    }
  </style>
</head>
<body>
  <h2>Parametric Curve Demo (Canvas + Vanilla JS)</h2>

  <div id="row">
    <canvas id="c" width="760" height="520"></canvas>

    <div class="panel">
      <label>Curve Type</label>
      <select id="preset">
        <option value="circle">Circle: x = R cos t, y = R sin t</option>
        <option value="lissajous">Lissajous: x = A sin(a t + δ), y = B sin(b t)</option>
        <option value="spiral">Spiral: x = t cos t, y = t sin t</option>
        <option value="cycloid">Cycloid: x = R(t − sin t), y = R(1 − cos t)</option>
      </select>

      <label>t</label>
      <input id="t" type="range" min="0" max="6.283185" step="0.001" value="0" />
      <div class="kv"><span>t</span><span id="tval">0</span></div>

      <label>Playback Speed</label>
      <input id="spd" type="range" min="0" max="4" step="0.01" value="1" />
      <div class="kv"><span>speed</span><span id="spdval">1</span></div>

      <label>Parameter 1</label>
      <input id="p1" type="range" min="20" max="200" step="1" value="120" />
      <div class="kv"><span id="p1name">R</span><span id="p1val">120</span></div>

      <label>Parameter 2</label>
      <input id="p2" type="range" min="1" max="10" step="1" value="3" />
      <div class="kv"><span id="p2name">a</span><span id="p2val">3</span></div>

      <label>Parameter 3</label>
      <input id="p3" type="range" min="1" max="10" step="1" value="2" />
      <div class="kv"><span id="p3name">b</span><span id="p3val">2</span></div>

      <label>Parameter 4</label>
      <input id="p4" type="range" min="0" max="3.14159" step="0.001" value="0.5" />
      <div class="kv"><span id="p4name">δ</span><span id="p4val">0.500</span></div>

      <button id="toggle">▶ Play</button>

      <div class="hint">
        Black line = full curve.<br/>
        Red line = trajectory up to current t.<br/>
        Pink dot = current point.<br/><br/>
        You can extend this by adding: zoom/pan, tangent vector, curvature,
        export to PNG, etc.
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  const el = (id) => document.getElementById(id);
  const presetSel = el("preset");
  const tSlider = el("t");
  const spdSlider = el("spd");
  const p1 = el("p1"), p2 = el("p2"), p3 = el("p3"), p4 = el("p4");

  const tval = el("tval"), spdval = el("spdval");
  const p1name = el("p1name"), p2name = el("p2name"), p3name = el("p3name"), p4name = el("p4name");
  const p1val = el("p1val"), p2val = el("p2val"), p3val = el("p3val"), p4val = el("p4val");

  const toggleBtn = el("toggle");

  const viewport = {
    origin: { x: canvas.width / 2, y: canvas.height / 2 },
    scale: 1
  };
  const FIT_PADDING = 28;
  const MIN_SPAN = 1e-6;

  function worldToScreen(p) {
    return {
      x: viewport.origin.x + p.x * viewport.scale,
      y: viewport.origin.y - p.y * viewport.scale
    };
  }

  const presets = {
    circle: {
      t0: 0, t1: Math.PI * 2,
      paramsUI: [
        { name: "R", min: 20, max: 220, step: 1, value: 140 },
        { name: "-", disabled: true },
        { name: "-", disabled: true },
        { name: "-", disabled: true },
      ],
      point: (t, P) => ({ x: P.R * Math.cos(t), y: P.R * Math.sin(t) })
    },

    lissajous: {
      t0: 0, t1: Math.PI * 2,
      paramsUI: [
        { name: "A", min: 20, max: 200, step: 1, value: 160 },
        { name: "a", min: 1, max: 10, step: 1, value: 3 },
        { name: "b", min: 1, max: 10, step: 1, value: 2 },
        { name: "δ", min: 0, max: Math.PI, step: 0.001, value: 0.5 },
      ],
      point: (t, P) => ({
        x: P.A * Math.sin(P.a * t + P.d),
        y: P.B * Math.sin(P.b * t)
      }),
      mapParams: (raw) => ({ A: raw.p1, B: raw.p1, a: raw.p2, b: raw.p3, d: raw.p4 })
    },

    spiral: {
      t0: 0, t1: 10 * Math.PI,
      paramsUI: [
        { name: "k", min: 5, max: 40, step: 1, value: 18 },
        { name: "-", disabled: true },
        { name: "-", disabled: true },
        { name: "-", disabled: true },
      ],
      point: (t, P) => ({ x: (t * P.k) * Math.cos(t), y: (t * P.k) * Math.sin(t) })
    },

    cycloid: {
      t0: 0, t1: 4 * Math.PI,
      paramsUI: [
        { name: "R", min: 10, max: 120, step: 1, value: 60 },
        { name: "-", disabled: true },
        { name: "-", disabled: true },
        { name: "-", disabled: true },
      ],
      point: (t, P) => ({ x: P.R * (t - Math.sin(t)), y: P.R * (1 - Math.cos(t)) })
    }
  };

  function setSlider(slider, {min, max, step, value, disabled}) {
    slider.min = String(min ?? slider.min);
    slider.max = String(max ?? slider.max);
    slider.step = String(step ?? slider.step);
    if (value !== undefined) slider.value = String(value);
    slider.disabled = !!disabled;
  }

  function applyPresetUI() {
    const key = presetSel.value;
    const pr = presets[key];

    tSlider.min = String(pr.t0);
    tSlider.max = String(pr.t1);
    tSlider.value = String(pr.t0);

    const uis = pr.paramsUI;
    const slots = [
      { slider: p1, nameEl: p1name, valEl: p1val },
      { slider: p2, nameEl: p2name, valEl: p2val },
      { slider: p3, nameEl: p3name, valEl: p3val },
      { slider: p4, nameEl: p4name, valEl: p4val },
    ];

    uis.forEach((ui, i) => {
      const s = slots[i];
      s.nameEl.textContent = ui.name;
      if (ui.disabled) {
        setSlider(s.slider, { disabled: true });
        s.valEl.textContent = "-";
      } else {
        setSlider(s.slider, ui);
      }
    });

    render();
  }

  function getRawParams() {
    return {
      p1: Number(p1.value),
      p2: Number(p2.value),
      p3: Number(p3.value),
      p4: Number(p4.value)
    };
  }

  function getParamsForPreset() {
    const key = presetSel.value;
    const pr = presets[key];
    const raw = getRawParams();

    if (pr.mapParams) return pr.mapParams(raw);
    if (key === "circle" || key === "cycloid") return { R: raw.p1 };
    if (key === "spiral") return { k: raw.p1 };
    return { R: raw.p1, a: raw.p2, b: raw.p3, d: raw.p4 };
  }

  function sampleCurve(pointFn, P, t0, t1, n = 1200) {
    const pts = [];
    for (let i = 0; i <= n; i++) {
      const tt = t0 + (t1 - t0) * (i / n);
      pts.push(pointFn(tt, P));
    }
    return pts;
  }

  function clamp(value, min, max) {
    return Math.min(max, Math.max(min, value));
  }

  function boundsFromPoints(points) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    points.forEach(({ x, y }) => {
      if (x < minX) minX = x;
      if (x > maxX) maxX = x;
      if (y < minY) minY = y;
      if (y > maxY) maxY = y;
    });
    return { minX, maxX, minY, maxY };
  }

  function fitViewportToPoints(points, padding = FIT_PADDING) {
    if (!points.length) return;
    const { minX, maxX, minY, maxY } = boundsFromPoints(points);
    const spanX = Math.max(maxX - minX, MIN_SPAN);
    const spanY = Math.max(maxY - minY, MIN_SPAN);
    const drawWidth = Math.max(1, canvas.width - padding * 2);
    const drawHeight = Math.max(1, canvas.height - padding * 2);

    viewport.scale = Math.min(drawWidth / spanX, drawHeight / spanY);
    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;
    viewport.origin.x = canvas.width / 2 - cx * viewport.scale;
    viewport.origin.y = canvas.height / 2 + cy * viewport.scale;
  }

  function drawBackdrop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#f8fbff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.strokeStyle = "rgba(100, 116, 139, 0.18)";
    ctx.lineWidth = 1;
    const grid = 40;
    for (let x = grid + 0.5; x < canvas.width; x += grid) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();
    }
    for (let y = grid + 0.5; y < canvas.height; y += grid) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }
    ctx.restore();

    const xAxisY = viewport.origin.y;
    const yAxisX = viewport.origin.x;
    ctx.strokeStyle = "rgba(30, 41, 59, 0.45)";
    ctx.lineWidth = 1.6;
    if (xAxisY >= 0 && xAxisY <= canvas.height) {
      ctx.beginPath();
      ctx.moveTo(0, xAxisY);
      ctx.lineTo(canvas.width, xAxisY);
      ctx.stroke();
    }
    if (yAxisX >= 0 && yAxisX <= canvas.width) {
      ctx.beginPath();
      ctx.moveTo(yAxisX, 0);
      ctx.lineTo(yAxisX, canvas.height);
      ctx.stroke();
    }
  }

  function drawPolyline(points, strokeStyle, lineWidth) {
    if (!points.length) return;
    ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = lineWidth;
    ctx.beginPath();
    points.forEach((p, i) => {
      const s = worldToScreen(p);
      if (i === 0) ctx.moveTo(s.x, s.y);
      else ctx.lineTo(s.x, s.y);
    });
    ctx.stroke();
  }

  function drawDot(p, fillStyle, r = 6) {
    const s = worldToScreen(p);
    ctx.fillStyle = fillStyle;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  function updateLabels() {
    tval.textContent = Number(tSlider.value).toFixed(3);
    spdval.textContent = Number(spdSlider.value).toFixed(2);
    if (!p1.disabled) p1val.textContent = Number(p1.value).toFixed(3);
    if (!p2.disabled) p2val.textContent = Number(p2.value).toFixed(3);
    if (!p3.disabled) p3val.textContent = Number(p3.value).toFixed(3);
    if (!p4.disabled) p4val.textContent = Number(p4.value).toFixed(3);
  }

  function render() {
    updateLabels();

    const key = presetSel.value;
    const pr = presets[key];
    const P = getParamsForPreset();

    const t0 = pr.t0, t1 = pr.t1;
    const t = Number(tSlider.value);
    const pointFn = pr.point;

    const allPts = sampleCurve(pointFn, P, t0, t1, 1200);
    fitViewportToPoints(allPts);
    drawBackdrop();

    drawPolyline(allPts, "#111", 2);

    const ratio = (t - t0) / (t1 - t0 || 1);
    const endIdx = clamp(Math.round(ratio * (allPts.length - 1)), 0, allPts.length - 1);
    const tailPts = allPts.slice(0, endIdx + 1);
    tailPts.push(pointFn(t, P));
    drawPolyline(tailPts, "#e11d48", 3);

    const p = pointFn(t, P);
    drawDot(p, "#fb7185", 7);

    const s = worldToScreen(p);
    const label = `x=${p.x.toFixed(2)}, y=${p.y.toFixed(2)}`;
    ctx.font = "13px Inter, system-ui, sans-serif";
    const textW = ctx.measureText(label).width;
    const lx = clamp(s.x + 12, 8, canvas.width - textW - 12);
    const ly = clamp(s.y - 12, 16, canvas.height - 8);
    ctx.fillStyle = "rgba(17, 24, 39, 0.82)";
    ctx.fillRect(lx - 4, ly - 12, textW + 8, 18);
    ctx.fillStyle = "#fff";
    ctx.fillText(label, lx, ly);
  }

  let playing = false;
  let last = performance.now();

  function tick(now) {
    const dt = (now - last) / 1000;
    last = now;

    if (playing) {
      const key = presetSel.value;
      const pr = presets[key];
      const speed = Number(spdSlider.value);
      let t = Number(tSlider.value);
      t += dt * speed;
      if (t > pr.t1) t = pr.t0;
      tSlider.value = String(t);
      render();
    }

    requestAnimationFrame(tick);
  }

  [presetSel, tSlider, spdSlider, p1, p2, p3, p4].forEach(x => x.addEventListener("input", render));
  presetSel.addEventListener("change", applyPresetUI);

  toggleBtn.addEventListener("click", () => {
    playing = !playing;
    toggleBtn.textContent = playing ? "⏸ Pause" : "▶ Play";
  });

  applyPresetUI();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
